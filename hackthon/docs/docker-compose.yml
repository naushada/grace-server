version: "3.9"

# Shared TUN capability required by both services.
# TUNSETIFF requires CAP_NET_ADMIN in the effective capability set.
# Docker grants it to the container but non-root processes do not inherit it
# into their effective set without ambient-capability support (kernel 4.3+,
# and runc ≥ 1.0).  Running as root is the portable, reliable choice for
# any service that opens /dev/net/tun.
x-tun-caps: &tun-caps
  user: root
  cap_add:
    - NET_ADMIN   # TUNSETIFF, SIOCADDRT/SIOCDELRT
    - NET_RAW     # tcpdump raw-socket capture
  devices:
    - /dev/net/tun:/dev/net/tun

networks:
  vpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Private network shared between vpn-client and gnmi-server-svc.
  # gnmi-server-svc is NOT reachable from vpn-net directly; only vpn-client
  # can reach it via its eth1 interface (172.21.0.0/24) and the socat proxy.
  app-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

services:

  # ─────────────────────────────────────────────────────────────────────────
  # vpn-server
  #   Listens on port 1194 (VPN tunnel) and 58989 (gNMI).
  #   Opens a kernel TUN interface (tun0) with server IP 10.8.0.1/24.
  #   Assigns virtual IPs from the pool to connecting clients.
  #   Adds/removes per-client host routes via SIOCADDRT/SIOCDELRT.
  #   When --mqtt-host is set (mqtt profile), subscribes to the mosquitto
  #   broker on topic "#" and forwards arriving gNMI payloads into the
  #   VPN tunnel via gnmi_client::push_async(topic, gnmi_port, ...).
  # ─────────────────────────────────────────────────────────────────────────
  vpn-server:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/app
      - --mode=server
      - --server-ip=10.8.0.1
      - --pool-start=10.8.0.2
      - --pool-end=10.8.0.254
      - --netmask=255.255.255.0
      - --gnmi-push=true        # push a gNMI Get to each client after tunnel up
      - --gnmi-port=58989       # client gNMI server port (accessible via tunnel)
      - --gnmi-push-delay=2     # seconds to wait for client gNMI server to start
    ports:
      - "1194:1194"      # VPN tunnel (TCP)
      - "58989:58989"    # gNMI gRPC
    networks:
      vpn-net:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD", "bash", "-c", "grep -q ':04AA' /proc/net/tcp"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # vpn-client
  #   Connects to vpn-server:1194 over the Docker bridge network.
  #   Receives IP_ASSIGN "10.8.0.X 255.255.255.0" from the server.
  #   Configures tun0 and registers a libevent TUN reader.
  #   Writes connection state to /run/vpn_status.lua.
  #   After tun0 is up, starts a socat proxy that listens on the assigned
  #   virtual IP (read from vpn_status.lua) and forwards port 58989 traffic
  #   to gnmi-server-svc on app-net (172.21.0.5:58989).
  # ─────────────────────────────────────────────────────────────────────────
  vpn-client:
    image: marvel:release
    user: root
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /app/app --mode=client \
                 --server=vpn-server \
                 --port=1194 \
                 --status=/run/vpn_status.lua &
        APP_PID=$$!
        until ip link show tun0 2>/dev/null | grep -q UP; do sleep 1; done
        VIP=$$(grep 'service_ip' /run/vpn_status.lua | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
        echo "[vpn-client] tunnel up, virtual IP=$$VIP — starting socat proxy"
        socat TCP-LISTEN:58989,bind=$${VIP},reuseaddr,fork \
              TCP:172.21.0.5:58989 &
        wait $${APP_PID}
    networks:
      vpn-net:
        ipv4_address: 172.20.0.3
      app-net:
        ipv4_address: 172.21.0.3
    depends_on:
      vpn-server:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # TLS server — uses bundled self-signed certs baked into the image at
  # /app/certs/ (see Dockerfile COPY certs/).  Profile: tls.
  # ─────────────────────────────────────────────────────────────────────────
  vpn-server-tls:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/app
      - --mode=server
      - --server-ip=10.9.0.1
      - --pool-start=10.9.0.2
      - --pool-end=10.9.0.254
      - --netmask=255.255.255.0
      - --tls=true
      - --cert=/app/certs/server.pem
      - --key=/app/certs/server.key
      - --ca=/app/certs/ca.pem
    ports:
      - "1195:1194"      # TLS tunnel on host port 1195
      - "58990:58989"    # gNMI gRPC (TLS server)
    networks:
      vpn-net:
        ipv4_address: 172.20.0.5
    healthcheck:
      test: ["CMD", "bash", "-c", "grep -q ':04AA' /proc/net/tcp"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s
    profiles:
      - tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # TLS client — certs baked into image; connects to vpn-server-tls.
  # ─────────────────────────────────────────────────────────────────────────
  vpn-client-tls:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/app
      - --mode=client
      - --server=vpn-server-tls
      - --port=1194
      - --status=/run/vpn_status.lua
      - --tls=true
      - --cert=/app/certs/client.pem
      - --key=/app/certs/client.key
      - --ca=/app/certs/ca.pem
    networks:
      vpn-net:
        ipv4_address: 172.20.0.6
    depends_on:
      vpn-server-tls:
        condition: service_healthy
    profiles:
      - tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI server — plain TCP on port 58989.  No VPN tunnel; direct gNMI access.
  # Profile: gnmi
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-server:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58989
    ports:
      - "58989:58989"    # gNMI gRPC (plain TCP)
    networks:
      vpn-net:
        ipv4_address: 172.20.0.7
    profiles:
      - gnmi
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI server — TLS on port 58989.  Certs baked into image at /app/certs/.
  # Profile: gnmi-tls
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-server-tls:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58989
      - --gnmi-tls=true
      - --gnmi-cert=/app/certs/server.pem
      - --gnmi-key=/app/certs/server.key
      - --gnmi-ca=/app/certs/ca.pem
    ports:
      - "58990:58989"    # gNMI gRPC (TLS) on host port 58990
    networks:
      vpn-net:
        ipv4_address: 172.20.0.8
    profiles:
      - gnmi-tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI client — plain TCP probe then stays connected via VPN tunnel.
  # Profile: gnmi
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-client:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/app
      - --mode=client
      - --server=vpn-server
      - --port=1194
      - --status=/run/vpn_status.lua
      - --gnmi-probe=true
      - --server-vip=10.8.0.1
      - --gnmi-port=58989
    networks:
      vpn-net:
        ipv4_address: 172.20.0.9
    depends_on:
      - vpn-server
      - gnmi-server
    profiles:
      - gnmi
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI client — TLS probe.  Profile: gnmi-tls
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-client-tls:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/app
      - --mode=client
      - --server=vpn-server-tls
      - --port=1194
      - --status=/run/vpn_status.lua
      - --gnmi-probe=true
      - --server-vip=10.9.0.1
      - --gnmi-port=58989
      - --gnmi-tls=true
      - --gnmi-cert=/app/certs/client.pem
      - --gnmi-key=/app/certs/client.key
      - --gnmi-ca=/app/certs/ca.pem
    networks:
      vpn-net:
        ipv4_address: 172.20.0.10
    depends_on:
      - vpn-server-tls
      - gnmi-server-tls
    profiles:
      - gnmi-tls
    restart: unless-stopped

  # ═════════════════════════════════════════════════════════════════════════
  # MQTT-based gNMI architecture  (profile: mqtt)
  #
  # Data-flow overview:
  #
  #   gnmi-client-svc
  #       │  publishes gNMI proto bytes
  #       │  MQTT topic = virtual-IP of target vpn-client (e.g. "10.8.0.3")
  #       ▼
  #   mosquitto broker (172.20.0.11:1883)
  #       │  fan-out to all subscribers
  #       ▼
  #   vpn-server  (subscribes to "#" via --mqtt-host)
  #       │  topic → look up which tunnel peer owns that virtual-IP
  #       │  call gnmi_client::push_async(topic, 58989, payload)
  #       │  → IP packet injected into VPN tunnel via openvpn_peer
  #       ▼
  #   VPN tunnel (TCP 1194, tun0 10.8.0.0/24)
  #       ▼
  #   vpn-client  (tun0 = 10.8.0.3, eth1 = 172.21.0.3)
  #       │  socat proxy: TCP-LISTEN:58989,bind=10.8.0.3 → TCP:172.21.0.5:58989
  #       ▼
  #   gnmi-server-svc  (172.21.0.5:58989, app-net only)
  #       │  processes gNMI Get / Update, sends reply back through tunnel
  # ═════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────
  # mosquitto — MQTT broker.  Profile: mqtt
  # ─────────────────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    networks:
      vpn-net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 3s
      timeout: 3s
      retries: 10
    profiles:
      - mqtt
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gnmi-server-svc — standalone gNMI server.  Profile: mqtt
  #   Lives on app-net (172.21.0.0/24) — invisible to vpn-net.
  #   Receives gNMI requests forwarded by vpn-client's socat proxy.
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-server-svc:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58989
    networks:
      app-net:
        ipv4_address: 172.21.0.5
    profiles:
      - mqtt
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gnmi-client-svc — publishes gNMI requests via MQTT.  Profile: mqtt
  #   topic   = virtual IP of the target vpn-client (e.g. "10.8.0.3")
  #   payload = serialised gnmi.GetRequest proto bytes
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-client-svc:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-mqtt-client
      - --mqtt-host=mosquitto
      - --mqtt-port=1883
      - --mqtt-topic=10.8.0.3        # virtual IP of target vpn-client
      - --interval=10
    networks:
      vpn-net:
        ipv4_address: 172.20.0.12
    depends_on:
      mosquitto:
        condition: service_healthy
      vpn-server:
        condition: service_healthy
      vpn-client:
        condition: service_started
    profiles:
      - mqtt
    restart: unless-stopped
