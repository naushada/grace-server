# Shared TUN capability required by both services.
# TUNSETIFF requires CAP_NET_ADMIN in the effective capability set.
# Docker grants it to the container but non-root processes do not inherit it
# into their effective set without ambient-capability support (kernel 4.3+,
# and runc ≥ 1.0).  Running as root is the portable, reliable choice for
# any service that opens /dev/net/tun.
x-tun-caps: &tun-caps
  user: root
  cap_add:
    - NET_ADMIN   # TUNSETIFF, SIOCADDRT/SIOCDELRT
    - NET_RAW     # tcpdump raw-socket capture
  devices:
    - /dev/net/tun:/dev/net/tun

networks:
  vpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Private network shared between vpn-client and gnmi-server-svc.
  # gnmi-server-svc is NOT reachable from vpn-net directly; only vpn-client
  # can reach it via its eth1 interface (172.21.0.0/24) and the socat proxy.
  app-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

services:

  # ─────────────────────────────────────────────────────────────────────────
  # vpn-server
  #   Listens on port 1194 (VPN tunnel) and 58989 (gNMI).
  #   Opens a kernel TUN interface (tun0) with server IP 10.8.0.1/24.
  #   Assigns virtual IPs from the pool to connecting clients.
  #   Adds/removes per-client host routes via SIOCADDRT/SIOCDELRT.
  #   When --mqtt-host is set (mqtt profile), each accepted peer subscribes
  #   to "fwd/<vip>" on the mosquitto broker independently and forwards
  #   gNMI requests via gnmi_client::push_async through the VPN tunnel.
  # ─────────────────────────────────────────────────────────────────────────
  vpn-server:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/vpn_server
      - --server-ip=10.8.0.1
      - --pool-start=10.8.0.2
      - --pool-end=10.8.0.254
      - --netmask=255.255.255.0
    ports:
      - "1194:1194"      # VPN tunnel (TCP)
      - "58989:58989"    # gNMI gRPC
    networks:
      vpn-net:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD", "bash", "-c", "grep -q ':04AA' /proc/net/tcp"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s
    profiles:
      - vpn
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # vpn-client
  #   Connects to vpn-server:1194 over the Docker bridge network.
  #   Receives IP_ASSIGN "10.8.0.X 255.255.255.0" from the server.
  #   Configures tun0 and registers a libevent TUN reader.
  #   Writes connection state to /run/vpn_status.lua.
  #   After tun0 is up, installs an iptables PREROUTING DNAT rule:
  #     <assigned-vip>:58989 → 172.21.0.5:58989 (gnmi-server-svc on app-net)
  #   Sits on both vpn-net (tunnel) and app-net (route to gnmi-server-svc).
  # ─────────────────────────────────────────────────────────────────────────
  vpn-client:
    image: marvel:release
    user: root
    cap_add:
      - NET_ADMIN   # TUN + iptables NAT
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    command:
      - /app/vpn_client
      - --server=vpn-server
      - --port=1194
      - --status=/run/vpn_status.lua
      - --gnmi-port=58989
      - --gnmi-fwd-ip=172.21.0.5      # gnmi-server-svc on app-net
      - --gnmi-fwd-port=58989
    networks:
      vpn-net:
        ipv4_address: 172.20.0.3
      app-net:
        ipv4_address: 172.21.0.3
    depends_on:
      vpn-server:
        condition: service_healthy
    profiles:
      - vpn
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # TLS server — uses bundled self-signed certs baked into the image at
  # /app/certs/ (see Dockerfile COPY certs/).  Profile: tls.
  # ─────────────────────────────────────────────────────────────────────────
  vpn-server-tls:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/vpn_server
      - --server-ip=10.9.0.1
      - --pool-start=10.9.0.2
      - --pool-end=10.9.0.254
      - --netmask=255.255.255.0
      - --tls=true
      - --cert=/app/certs/server.pem
      - --key=/app/certs/server.key
      - --ca=/app/certs/ca.pem
    ports:
      - "1195:1194"      # TLS tunnel on host port 1195
      - "58990:58989"    # gNMI gRPC (TLS server)
    networks:
      vpn-net:
        ipv4_address: 172.20.0.5
    healthcheck:
      test: ["CMD", "bash", "-c", "grep -q ':04AA' /proc/net/tcp"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s
    profiles:
      - tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # TLS client — certs baked into image; connects to vpn-server-tls.
  # ─────────────────────────────────────────────────────────────────────────
  vpn-client-tls:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/vpn_client
      - --server=vpn-server-tls
      - --port=1194
      - --status=/run/vpn_status.lua
      - --tls=true
      - --cert=/app/certs/client.pem
      - --key=/app/certs/client.key
      - --ca=/app/certs/ca.pem
    networks:
      vpn-net:
        ipv4_address: 172.20.0.6
    depends_on:
      vpn-server-tls:
        condition: service_healthy
    profiles:
      - tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # registration-svc — device registration service.
  #   Dedicated port 58988 (plain TCP) + 58992 (TLS) on the same container.
  #   Plain and TLS listeners run simultaneously via --gnmi-tls-port.
  #   Devices call /gnmi.gNMI/Set to register and /gnmi.gNMI/Get to query.
  #   Profile: registration, registration-tls, mqtt, mqtt-tls
  # ─────────────────────────────────────────────────────────────────────────
  registration-svc:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58988
      - --gnmi-tls-port=58992
      - --gnmi-cert=/app/certs/server.pem
      - --gnmi-key=/app/certs/server.key
      - --gnmi-ca=/app/certs/ca.pem
    ports:
      - "58988:58988"    # registration gRPC (plain TCP)
      - "58992:58992"    # registration gRPC (TLS)
    networks:
      vpn-net:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "bash", "-c", "grep -q ':E66C' /proc/net/tcp && grep -q ':E670' /proc/net/tcp"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 2s
    profiles:
      - registration
      - registration-tls
      - mqtt
      - mqtt-tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # telemetry-svc — telemetry collection service.
  #   Dedicated port 58989 (plain TCP) + 58993 (TLS) on the same container.
  #   Plain and TLS listeners run simultaneously via --gnmi-tls-port.
  #   Devices push telemetry via /gnmi.gNMI/Set; operators poll via Get.
  #   Host port 58991 maps plain TCP to avoid collision with gnmi-server (58989).
  #   Profile: telemetry, telemetry-tls, mqtt, mqtt-tls
  # ─────────────────────────────────────────────────────────────────────────
  telemetry-svc:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58989
      - --gnmi-tls-port=58993
      - --gnmi-cert=/app/certs/server.pem
      - --gnmi-key=/app/certs/server.key
      - --gnmi-ca=/app/certs/ca.pem
    ports:
      - "58991:58989"    # telemetry gRPC (plain TCP); host 58991 → container 58989
      - "58993:58993"    # telemetry gRPC (TLS)
    networks:
      vpn-net:
        ipv4_address: 172.20.0.14
    healthcheck:
      test: ["CMD", "bash", "-c", "grep -q ':E66D' /proc/net/tcp && grep -q ':E671' /proc/net/tcp"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 2s
    profiles:
      - telemetry
      - telemetry-tls
      - mqtt
      - mqtt-tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI server — plain TCP on port 58989.  No VPN tunnel; direct gNMI access.
  # Profile: gnmi
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-server:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58989
    ports:
      - "58989:58989"    # gNMI gRPC (plain TCP)
    networks:
      vpn-net:
        ipv4_address: 172.20.0.7
    profiles:
      - gnmi
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI server — TLS on port 58989.  Certs baked into image at /app/certs/.
  # Profile: gnmi-tls
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-server-tls:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58989
      - --gnmi-tls=true
      - --gnmi-cert=/app/certs/server.pem
      - --gnmi-key=/app/certs/server.key
      - --gnmi-ca=/app/certs/ca.pem
    ports:
      - "58990:58989"    # gNMI gRPC (TLS) on host port 58990
    networks:
      vpn-net:
        ipv4_address: 172.20.0.8
    profiles:
      - gnmi-tls
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI client — plain TCP probe then stays connected via VPN tunnel.
  # Profile: gnmi
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-client:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/vpn_client
      - --server=vpn-server
      - --port=1194
      - --status=/run/vpn_status.lua
      - --gnmi-probe=true
      - --server-vip=10.8.0.1
      - --gnmi-port=58989
    networks:
      vpn-net:
        ipv4_address: 172.20.0.9
    depends_on:
      - vpn-server
      - gnmi-server
    profiles:
      - gnmi
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gNMI client — TLS probe.  Profile: gnmi-tls
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-client-tls:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/vpn_client
      - --server=vpn-server-tls
      - --port=1194
      - --status=/run/vpn_status.lua
      - --gnmi-probe=true
      - --server-vip=10.9.0.1
      - --gnmi-port=58989
      - --gnmi-tls=true
      - --gnmi-cert=/app/certs/client.pem
      - --gnmi-key=/app/certs/client.key
      - --gnmi-ca=/app/certs/ca.pem
    networks:
      vpn-net:
        ipv4_address: 172.20.0.10
    depends_on:
      - vpn-server-tls
      - gnmi-server-tls
    profiles:
      - gnmi-tls
    restart: unless-stopped

  # ═════════════════════════════════════════════════════════════════════════
  # MQTT-based gNMI architecture  (profile: mqtt)
  #
  # Data-flow — 3 stages:
  #
  #   [Stage 1] CLI app (cli_app)
  #       │  user runs: gnmi_get / gnmi_update / gnmi_replace / gnmi_delete
  #       │  cli_app serialises request into proto bytes and publishes:
  #       │    MQTT topic   = "cli/<target-virtual-ip>"  (e.g. "cli/10.8.0.3")
  #       │    MQTT payload = rpc_path + '\0' + proto_bytes
  #       ▼
  #   mosquitto broker (172.20.0.11:1883)
  #       ▼
  #   [Stage 2] gnmi-client-svc  (subscribes to "cli/#")
  #       │  relay: strips "cli/" prefix, republishes on "fwd/<ip>"
  #       │    MQTT topic   = "fwd/<target-virtual-ip>"
  #       │    MQTT payload = unchanged (rpc_path + '\0' + proto_bytes)
  #       ▼
  #   mosquitto broker
  #       ▼
  #   [Stage 3] openvpn_peer  (per-client, subscribes to "fwd/<vip>")
  #       │  parses payload → rpc_path + proto_bytes
  #       │  calls gnmi_client::push_async(vip, 58989, rpc_path, proto_bytes)
  #       │  → HTTP/2 gRPC frame injected into VPN tunnel
  #       │  response published to "resp/<vip>" for gnmi-client-svc relay
  #       ▼
  #   VPN tunnel (TCP 1194, tun0 10.8.0.0/24)
  #       ▼
  #   vpn-client  (tun0 = 10.8.0.3, eth1 = 172.21.0.3)
  #       │  socat proxy: TCP-LISTEN:58989,bind=10.8.0.3 → TCP:172.21.0.5:58989
  #       ▼
  #   gnmi-server-svc  (172.21.0.5:58989, app-net only)
  #       └  processes gNMI Get / Update, sends reply back through tunnel
  # ═════════════════════════════════════════════════════════════════════════

  # ═════════════════════════════════════════════════════════════════════════
  # Standard OpenVPN + gNMI + MQTT stack  (profile: openvpn)
  #
  # All six services below share the openvpn profile and start together:
  #
  #   mosquitto        → MQTT broker (no deps)
  #   gnmi-server-svc  → gNMI target on app-net (no deps)
  #   gnmi-client-svc  → MQTT relay: cli/<vip> → fwd/<vip>
  #                       depends on: mosquitto healthy
  #   openvpn-server   → system openvpn server + per-client MQTT subscriber
  #                       depends on: mosquitto healthy
  #   openvpn-client   → system openvpn client + iptables DNAT
  #                       depends on: openvpn-server healthy, gnmi-server-svc started
  #   cli              → interactive Marvel> REPL
  #                       depends on: mosquitto healthy, gnmi-client-svc started,
  #                                   openvpn-server started
  #
  # Startup order:
  #   mosquitto (healthy) ──► gnmi-client-svc
  #                      ──► openvpn-server (healthy) ──► openvpn-client
  #                      ──► cli
  #   gnmi-server-svc (immediate, no deps)
  # ═════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────
  # mosquitto — MQTT broker.  Profile: openvpn, mqtt
  # ─────────────────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    networks:
      vpn-net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 3s
      timeout: 3s
      retries: 10
    profiles:
      - openvpn
      - mqtt
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gnmi-server-svc — gNMI target server.  Profile: openvpn, mqtt
  #   Lives on app-net (172.21.0.0/24) — not reachable from vpn-net directly.
  #   Traffic reaches it only via iptables DNAT installed by openvpn-client.
  #   No depends_on — starts immediately alongside mosquitto.
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-server-svc:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-server
      - --gnmi-port=58989
    networks:
      app-net:
        ipv4_address: 172.21.0.5
    profiles:
      - openvpn
      - mqtt
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # gnmi-client-svc — MQTT relay.  Profile: openvpn, mqtt
  #   Subscribes to cli/# and republishes on fwd/<vip> for openvpn-server.
  #   Depends on: mosquitto healthy
  # ─────────────────────────────────────────────────────────────────────────
  gnmi-client-svc:
    image: marvel:release
    command:
      - /app/app
      - --mode=gnmi-mqtt-client
      - --mqtt-host=mosquitto
      - --mqtt-port=1883
    networks:
      vpn-net:
        ipv4_address: 172.20.0.12
    depends_on:
      mosquitto:
        condition: service_healthy
    profiles:
      - openvpn
      - mqtt
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # openvpn-server  Profile: openvpn
  #   Spawns system openvpn --server; polls management interface every 5 s.
  #   Per-client MQTT subscriber on fwd/<vip> — forwards gNMI through tunnel.
  #   Depends on: mosquitto healthy
  # ─────────────────────────────────────────────────────────────────────────
  openvpn-server:
    image: marvel:release
    <<: *tun-caps
    command:
      - /app/openvpn_server
      - --port=1194
      - --mgmt-port=7505
      - --mqtt-host=mosquitto
      - --mqtt-port=1883
      - --gnmi-port=58989
    ports:
      - "11194:1194"    # OpenVPN TCP tunnel (host 11194 avoids clash with vpn-server)
    networks:
      vpn-net:
        ipv4_address: 172.20.0.15
    healthcheck:
      # Management interface on 7505 (0x1D51) opens only after openvpn is ready.
      test: ["CMD", "bash", "-c", "grep -q ':1D51' /proc/net/tcp"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      mosquitto:
        condition: service_healthy
    profiles:
      - openvpn
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # openvpn-client  Profile: openvpn
  #   Spawns system openvpn --client; installs iptables DNAT on tunnel-up:
  #     <vip>:80,443,58989 → gnmi-server-svc (172.21.0.5)
  #   Depends on: openvpn-server healthy, gnmi-server-svc started
  # ─────────────────────────────────────────────────────────────────────────
  openvpn-client:
    image: marvel:release
    user: root
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    command:
      - /app/openvpn_client
      - --server=openvpn-server
      - --port=1194
      - --fwd-host=172.21.0.5    # gnmi-server-svc on app-net
      - --fwd-ports=80,443,58989
    networks:
      vpn-net:
        ipv4_address: 172.20.0.16
      app-net:
        ipv4_address: 172.21.0.6
    depends_on:
      openvpn-server:
        condition: service_healthy
      gnmi-server-svc:
        condition: service_started
    profiles:
      - openvpn
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # cli  Profile: openvpn
  #   Interactive readline REPL (Marvel> prompt).
  #   Publishes gNMI requests on cli/<vip>; receives responses on cli_resp/<vip>.
  #   Attach: docker compose --profile openvpn attach cli
  #   Detach without stopping: Ctrl-P Ctrl-Q
  #   Depends on: mosquitto healthy, gnmi-client-svc started,
  #               openvpn-server started
  # ─────────────────────────────────────────────────────────────────────────
  cli:
    image: marvel:release
    entrypoint: /app/cli_app
    stdin_open: true
    tty: true
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    networks:
      vpn-net:
        ipv4_address: 172.20.0.18
    depends_on:
      mosquitto:
        condition: service_healthy
      gnmi-client-svc:
        condition: service_started
      openvpn-server:
        condition: service_started
    profiles:
      - openvpn
    restart: "no"
