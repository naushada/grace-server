# Override file for the mqtt / mqtt-tls profiles.
# Adds --mqtt-host/--mqtt-port to vpn-server so it subscribes to mosquitto,
# and wires vpn-server's depends_on to mosquitto.
# Also ensures registration-svc is healthy before vpn-server starts.
#
# registration-svc and telemetry-svc each listen on both plain and TLS ports
# simultaneously (dual-port mode), so no separate *-tls services are needed.
#
# Usage:
#   docker compose -f docs/docker-compose.yml \
#                  -f docs/docker-compose.mqtt.yml \
#                  --profile mqtt up

services:
  vpn-server:
    command:
      - /app/vpn_server
      - --server-ip=10.8.0.1
      - --pool-start=10.8.0.2
      - --pool-end=10.8.0.254
      - --netmask=255.255.255.0
      - --mqtt-host=mosquitto
      - --mqtt-port=1883
      - --gnmi-port=58989
    depends_on:
      mosquitto:
        condition: service_healthy
      registration-svc:
        condition: service_healthy
